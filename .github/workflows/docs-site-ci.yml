name: docs-site-ci

on:
  push:
    paths:
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "themes/**"
      - "scripts/**"
      - "hugo.toml"
      - "vercel.json"
      - ".github/workflows/docs-site-ci.yml"
  pull_request:
    paths:
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "themes/**"
      - "scripts/**"
      - "hugo.toml"
      - "vercel.json"
      - ".github/workflows/docs-site-ci.yml"

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: pip install pyyaml

      - name: Auto-resolve common metadata issues
        run: python scripts/auto_resolve_content_issues.py

      - name: Validate content metadata
        run: python scripts/validate_content.py

      - name: Install Hugo Extended
        run: |
          HUGO_VERSION="0.152.2"
          curl -fsSL -o /tmp/hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb
          hugo version

      - name: Hugo build
        run: |
          rm -f data/keyword_proposals.jsonl
          hugo --gc --minify

      - name: Verify build output
        run: test -f public/index.html

  deploy-vercel:
    needs: validate-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_RTKyG0Rcfpu4LYhgPpGRJqJK
      VERCEL_PROJECT_ID: prj_1e1JptyR4OdLQ7653OBGl40QL1nc
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check required Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Missing GitHub secret: VERCEL_TOKEN"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Remove transient keyword proposal queue before Vercel build
        run: rm -f data/keyword_proposals.jsonl

      - name: Build Vercel artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
