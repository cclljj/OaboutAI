name: docs-site-ci

on:
  push:
    paths:
      - "core/**"
      - "apps/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - "INSTALL.md"
      - "AGENTS.md"
      - "vercel.json"
      - ".github/workflows/docs-site-ci.yml"
  pull_request:
    paths:
      - "core/**"
      - "apps/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - "INSTALL.md"
      - "AGENTS.md"
      - "vercel.json"
      - ".github/workflows/docs-site-ci.yml"
  workflow_dispatch:
    inputs:
      app_id:
        description: "App id under apps/<app-id>"
        required: false
        default: "oaboutai"

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ github.event.inputs.app_id || 'oaboutai' }}
      COMPOSED_SITE: /tmp/oaboutai-site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: pip install pyyaml

      - name: Compose site (core + app)
        run: python scripts/compose_site.py --app-id "${APP_ID}" --output "${COMPOSED_SITE}" --clean

      - name: Sync topic pages from topics.json
        run: python scripts/sync_topics.py
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Auto-resolve common metadata issues
        run: python scripts/auto_resolve_content_issues.py
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Validate content metadata
        run: python scripts/validate_content.py
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Install Hugo Extended
        run: |
          HUGO_VERSION="0.152.2"
          curl -fsSL -o /tmp/hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb
          hugo version

      - name: Hugo build
        run: |
          rm -f data/keyword_proposals.jsonl
          hugo --gc --minify
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Verify build output
        run: test -f public/index.html
        working-directory: ${{ env.COMPOSED_SITE }}

  deploy-vercel:
    needs: validate-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      APP_ID: oaboutai
      COMPOSED_SITE: /tmp/oaboutai-site
      VERCEL_ORG_ID: team_RTKyG0Rcfpu4LYhgPpGRJqJK
      VERCEL_PROJECT_ID: prj_1e1JptyR4OdLQ7653OBGl40QL1nc
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Check required Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Missing GitHub secret: VERCEL_TOKEN"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Compose site (core + app)
        run: python scripts/compose_site.py --app-id "${APP_ID}" --output "${COMPOSED_SITE}" --clean

      - name: Sync topic pages from topics.json
        run: python scripts/sync_topics.py
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Remove transient keyword proposal queue before Vercel build
        run: rm -f data/keyword_proposals.jsonl
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Write compose-site Vercel config
        run: |
          cat > vercel.json <<'JSON'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "buildCommand": "rm -f data/keyword_proposals.jsonl && npx --yes hugo-bin --gc --minify",
            "outputDirectory": "public",
            "rewrites": [
              {
                "source": "/items/:slug",
                "destination": "/item/?slug=:slug"
              },
              {
                "source": "/items/:slug/",
                "destination": "/item/?slug=:slug"
              },
              {
                "source": "/zh-tw/items/:slug",
                "destination": "/zh-tw/item/?slug=:slug"
              },
              {
                "source": "/zh-tw/items/:slug/",
                "destination": "/zh-tw/item/?slug=:slug"
              },
              {
                "source": "/keywords/:term",
                "destination": "/items/?term_type=keywords&term_value=:term"
              },
              {
                "source": "/keywords/:term/",
                "destination": "/items/?term_type=keywords&term_value=:term"
              },
              {
                "source": "/types/:term",
                "destination": "/items/?term_type=types&term_value=:term"
              },
              {
                "source": "/types/:term/",
                "destination": "/items/?term_type=types&term_value=:term"
              },
              {
                "source": "/zh-tw/keywords/:term",
                "destination": "/zh-tw/items/?term_type=keywords&term_value=:term"
              },
              {
                "source": "/zh-tw/keywords/:term/",
                "destination": "/zh-tw/items/?term_type=keywords&term_value=:term"
              },
              {
                "source": "/zh-tw/types/:term",
                "destination": "/zh-tw/items/?term_type=types&term_value=:term"
              },
              {
                "source": "/zh-tw/types/:term/",
                "destination": "/zh-tw/items/?term_type=types&term_value=:term"
              }
            ]
          }
          JSON
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Build Vercel artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ env.COMPOSED_SITE }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ env.COMPOSED_SITE }}
