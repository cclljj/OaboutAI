baseURL = "https://oaboutai.vercel.app/"
title = "OaboutAI Knowledge Archive"
theme = "hextra"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = false

[taxonomies]
  topic = "topics"
  keyword = "keywords"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[permalinks]
  items = "/items/:slug/"

[params]
  description = "Agent-maintained archive for AI policy, governance, and safety resources."
  displayUpdatedDate = true
  dateFormat = "2006-01-02"

  [params.search]
    enable = true
    type = "flexsearch"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [[params.navbar.links]]
    name = "Recent"
    url = "/"
  [[params.navbar.links]]
    name = "Topics"
    url = "/topics/"
  [[params.navbar.links]]
    name = "Monthly Archive"
    url = "/archive/monthly/"

[menu]
  [[menu.main]]
    identifier = "recent"
    name = "Recent"
    pageRef = "/"
    weight = 10
  [[menu.main]]
    identifier = "topic-policy"
    name = "AI Policy"
    pageRef = "/topics/ai-policy"
    weight = 20
  [[menu.main]]
    identifier = "topic-governance"
    name = "AI Governance"
    pageRef = "/topics/ai-governance"
    weight = 30
  [[menu.main]]
    identifier = "topic-safety"
    name = "AI Safety"
    pageRef = "/topics/ai-safety"
    weight = 40
  [[menu.main]]
    identifier = "archive"
    name = "Monthly Archive"
    pageRef = "/archive/monthly"
    weight = 50
  [[menu.main]]
    identifier = "language-switcher"
    name = "Language"
    weight = 60
    [menu.main.params]
      type = "language-switch"
      label = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en"
  [languages.zh-tw]
    languageName = "繁體中文"
    languageCode = "zh-TW"
    weight = 2
    contentDir = "content/zh-tw"
