{{ define "main" }}
<div class="oa-shell">
  <article class="oa-intro-card">
    <h1 class="oa-page-title">{{ .Title }}</h1>
    {{ .Content }}
  </article>
  <section class="oa-section">
    <h2 class="oa-section-title">{{ i18n "entriesInTopic" }}</h2>
    <div class="oa-entry-list" data-oa-protected-view="topic" data-oa-topic="{{ .Params.topic_key }}">
      <p class="oa-page-subtitle">{{ i18n "loadingProtectedContent" }}</p>
    </div>
  </section>
</div>
{{ end }}
