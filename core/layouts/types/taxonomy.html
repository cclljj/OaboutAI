{{ define "main" }}
<div class="oa-shell">

  {{ with .Content }}<div class="oa-page-subtitle">{{ . }}</div>{{ end }}
  <section data-oa-protected-view="terms_catalog" data-oa-term-type="types">

  </section>
</div>
{{ end }}
