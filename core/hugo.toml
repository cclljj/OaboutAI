baseURL = "https://example.com/"
title = "Knowledge Archive"
theme = "hextra"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = false

[taxonomies]
  topic = "topics"
  keyword = "keywords"
  source_type = "types"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[permalinks]
  items = "/items/:slug/"

[params]
  description = "Composable knowledge archive."
  displayUpdatedDate = true
  dateFormat = "2006-01-02"

  [params.search]
    enable = true
    type = "flexsearch"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [[params.navbar.links]]
    name = "Recent"
    url = "/"
  [[params.navbar.links]]
    name = "Topics"
    url = "/topics/"
  [[params.navbar.links]]
    name = "Keywords"
    url = "/keywords/"
  [[params.navbar.links]]
    name = "Types"
    url = "/types/"
  [[params.navbar.links]]
    name = "Archive"
    url = "/archive/monthly/"

[menu]
  [[menu.main]]
    identifier = "recent"
    name = "Recent"
    pageRef = "/"
    weight = 10
  [[menu.main]]
    identifier = "topics"
    name = "Topics"
    pageRef = "/topics"
    weight = 20
  [[menu.main]]
    identifier = "keywords"
    name = "Keywords"
    pageRef = "/keywords"
    weight = 30
  [[menu.main]]
    identifier = "types"
    name = "Types"
    pageRef = "/types"
    weight = 35
  [[menu.main]]
    identifier = "archive"
    name = "Archive"
    pageRef = "/archive/monthly"
    weight = 40
  [[menu.main]]
    identifier = "menuSearch"
    name = "Search"
    pageRef = "/search"
    weight = 45
  [[menu.main]]
    identifier = "language-switcher"
    name = "Language"
    weight = 50
    [menu.main.params]
      type = "language-switch"
      label = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en"
  [languages.zh-tw]
    languageName = "繁體中文"
    languageCode = "zh-TW"
    weight = 2
    contentDir = "content/zh-tw"
